  <!-- Redirect www to non-www (www subdomain has no SSL cert) -->
  <script>
  if (location.hostname === 'www.accioscore.com') {

  }
  </script>

  <!-- PWA version check — fetches version.json from server bypassing all caches -->
  <script>
  (function(){
    var LOCAL_VERSION = 143;
    var KEY = 'accios_version';
    var PURGE_KEY = 'accios_purging';

    // If we just purged, skip checks — we're on the fresh reload
    if (sessionStorage.getItem(PURGE_KEY)) {
      sessionStorage.removeItem(PURGE_KEY);
      localStorage.setItem(KEY, String(LOCAL_VERSION));
      return;
    }

    // Step 1: localStorage-based check (instant)
    try {
      var stored = parseInt(localStorage.getItem(KEY) || '0');
      localStorage.setItem(KEY, LOCAL_VERSION);
      if (stored > 0 && stored < LOCAL_VERSION && navigator.onLine) {
        purgeAndReload();
        return;
      }
    } catch(e) {}

    // Step 2: Fetch version.json from server (bypasses SW + HTTP cache)
    if (navigator.onLine) {
      fetch('/version.json?_=' + Date.now(), { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.v && data.v > LOCAL_VERSION) {
            purgeAndReload();
          }
        })
        .catch(function() {});
    }

    function purgeAndReload() {
      // Mark that we're purging so next load skips checks
      sessionStorage.setItem(PURGE_KEY, '1');
      // Hide loading screen to avoid showing it twice
      var ls = document.getElementById('loading-screen');
      if (ls) ls.style.display = 'none';
      // Purge SW + caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
      setTimeout(function() { location.reload(true); }, 300);
    }
  })();
  </script>
